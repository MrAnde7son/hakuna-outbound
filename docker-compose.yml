services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_PATH=/app/data/hakuna.db
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/adc.json
    volumes:
      - hakuna-db:/app/data
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcp/adc.json:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  hakuna-db:
