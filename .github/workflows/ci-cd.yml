name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  # Serialize deploys per-ref so two pushes to main can't race the
  # `:latest` tag move + `gcloud run deploy`. Non-main branches just get
  # the test job and are fine to cancel-in-progress.
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check (syntax)
        working-directory: backend
        run: python -m compileall -q .

      - name: Import smoke check
        # Catches import-time errors (missing deps, broken module-level code)
        # without needing real credentials — the app's API clients fall back
        # to mock mode when env vars are absent (see /api/health).
        working-directory: backend
        run: python -c "import main; print('ok')"

      - name: Run pytest (if any tests exist)
        working-directory: backend
        run: |
          pip install pytest
          if [ -d tests ] || compgen -G "test_*.py" > /dev/null; then
            pytest -q
          else
            echo "no tests yet — skipping pytest"
          fi

  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Build
        working-directory: frontend
        # Build with a placeholder API URL so we at least catch type/syntax
        # errors. The real URL gets baked in at deploy time by deploy.sh.
        env:
          VITE_API_URL: https://example.invalid
        run: npm run build

  deploy:
    name: Deploy
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_DEPLOY_SERVICE_ACCOUNT live
    # under this GitHub Environment, not at repo level.
    environment: prod

    # Required for google-github-actions/auth via Workload Identity Federation.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          # deploy.sh runs `git rev-parse --short HEAD` and refuses to deploy
          # with a dirty tree. A normal shallow checkout is fine.
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID || 'hakuna-prod-2026' }}

      - name: Deploy
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'hakuna-prod-2026' }}
          REGION: ${{ vars.GCP_REGION || 'us-central1' }}
          NAME: ${{ vars.GCP_RESOURCE_NAME || 'hakuna-outbound' }}
        run: scripts/deploy.sh
